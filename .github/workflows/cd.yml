name: Cloud Run Deployment Notice

on:
  workflow_dispatch:

jobs:
  notice:
    runs-on: ubuntu-latest

    steps:
    - name: Explain deployment path
      run: |
        echo "Backend deployment now runs through Google Cloud Build triggers, not GitHub Actions."
        echo "Frontend deployment is expected to run through Vercel."
        echo "See docs/cloud-run-deployment.md and docs/vercel-frontend-deployment.md."
