name: Continuous Deployment

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Configure Docker
      run: |
        gcloud auth configure-docker --quiet

    - name: Build and push API Gateway
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/api-gateway:$GITHUB_SHA ./services/api-gateway
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/api-gateway:$GITHUB_SHA

    - name: Build and push AI Decision Engine
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-decision-engine:$GITHUB_SHA ./services/ai-decision-engine
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-decision-engine:$GITHUB_SHA

    - name: Build and push Teapot Service
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/teapot-service:$GITHUB_SHA ./services/teapot-service
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/teapot-service:$GITHUB_SHA

    - name: Build and push Punctuation Service
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/punctuation-service:$GITHUB_SHA ./services/punctuation-service
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/punctuation-service:$GITHUB_SHA

    - name: Build and push Capitalization Service
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/capitalization-service:$GITHUB_SHA ./services/capitalization-service
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/capitalization-service:$GITHUB_SHA

    - name: Build and push Concatenation Service
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/concatenation-service:$GITHUB_SHA ./services/concatenation-service
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/concatenation-service:$GITHUB_SHA

    - name: Build and push Feature Flag Service
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/feature-flag-service:$GITHUB_SHA ./services/feature-flag-service
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/feature-flag-service:$GITHUB_SHA

    - name: Build and push A/B Testing Service
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/ab-testing-service:$GITHUB_SHA ./services/ab-testing-service
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/ab-testing-service:$GITHUB_SHA

    - name: Build and push Frontend
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:$GITHUB_SHA ./services/frontend
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:$GITHUB_SHA

    - name: Deploy to Cloud Run
      run: |
        # Deploy API Gateway
        gcloud run deploy api-gateway \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/api-gateway:$GITHUB_SHA \
          --platform managed \
          --region us-central1 \
          --allow-unauthenticated \
          --port 3000

        # Deploy other services similarly...
        # (In a real deployment, this would be more sophisticated with service mesh, etc.)

    - name: Update traffic
      run: |
        # Gradual rollout
        gcloud run services update-traffic api-gateway \
          --to-revisions=LATEST=100 \
          --region us-central1

    - name: Run smoke tests
      run: |
        # Simple health checks
        curl -f https://api-gateway-[hash]-uc.a.run.app/health || exit 1

    - name: Notify deployment
      run: |
        echo "Deployment completed successfully!"
        # In a real scenario, this would send notifications to Slack, etc.