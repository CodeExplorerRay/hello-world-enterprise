name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Smoke test scripts
      run: |
        node --check scripts/smoke-test-endpoints.js
        node --check scripts/rebuild-and-smoke-test.js

    - name: Validate gateway helper smoke test
      run: |
        node services/api-gateway/smoke-test.js
