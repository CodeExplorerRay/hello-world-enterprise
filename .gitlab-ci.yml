stages:
  - build
  - deploy
  - test

build:backend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - |
      for service in ai-decision-engine teapot-service punctuation-service feature-flag-service ab-testing-service concatenation-service capitalization-service api-gateway; do
        echo "Building $service"
        docker build -t $CI_REGISTRY_IMAGE/$service:$CI_COMMIT_SHA ./services/$service
        docker push $CI_REGISTRY_IMAGE/$service:$CI_COMMIT_SHA
      done
  only:
    - main
    - master

deploy:backend:
  stage: deploy
  image: node:latest
  script:
    - npm install -g @railway/cli
    - |
      deploy_service() {
        token="$1"
        folder="$2"
        service="$3"

        RAILWAY_TOKEN="$token" railway up "services/$folder" --service "$service" --path-as-root --ci
      }

      # Primary Railway project:
      # https://railway.com/project/682269ec-f789-4fe3-834e-c3e9b31e8b50
      deploy_service "$RAILWAY_TOKEN_PRIMARY" "api-gateway" "api-gateway"

      # Wait for deployment and get the API Gateway URL for downstream jobs.
      sleep 30
      API_GATEWAY_URL=$(RAILWAY_TOKEN="$RAILWAY_TOKEN_PRIMARY" railway domain --service api-gateway | grep -o 'https://[^ ]*' | head -n 1)
      echo "API_GATEWAY_URL=$API_GATEWAY_URL" >> deploy.env

      deploy_service "$RAILWAY_TOKEN_PRIMARY" "ai-decision-engine" "ai-decision-engine"
      deploy_service "$RAILWAY_TOKEN_PRIMARY" "ab-testing-service" "ab-testing-service"
      deploy_service "$RAILWAY_TOKEN_PRIMARY" "punctuation-service" "punctuation-service"
      deploy_service "$RAILWAY_TOKEN_PRIMARY" "feature-flag-service" "feature-flag-service"

      # Secondary Railway project:
      # https://railway.com/project/893b3ff6-3a21-4789-99b8-85cfd02068d3
      deploy_service "$RAILWAY_TOKEN_SECONDARY" "teapot-service" "teapot-service"
      deploy_service "$RAILWAY_TOKEN_SECONDARY" "capitalization-service" "capitalization-service"
      deploy_service "$RAILWAY_TOKEN_SECONDARY" "concatenation-service" "concatenation-service"
  artifacts:
    reports:
      dotenv: deploy.env
  environment:
    name: production
  only:
    - main
    - master

test:backend:
  stage: test
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - source deploy.env
    - |
      # Wait for all services to be ready
      for i in {1..60}; do
        if curl -fsS $API_GATEWAY_URL/health 2>/dev/null; then
          break
        fi
        echo "Waiting for deployment... ($i/60)"
        sleep 10
      done

      # Test health endpoints
      curl -fsS $API_GATEWAY_URL/health

      # Test greeting API
      response=$(curl -fsS -H "Content-Type: application/json" \
        -d '{"recipient":"World","channel":"web","locale":"en-US","preferredGreeting":"auto"}' \
        $API_GATEWAY_URL/api/greet)
      echo $response | grep '"greeting"'
  dependencies:
    - deploy:backend
  only:
    - main
    - master

deploy:frontend:vercel:
  stage: deploy
  image: node:latest
  script:
    - cd services/frontend
    - npm ci
    - API_GATEWAY_ORIGIN=$(cat ../../deploy.env | grep API_GATEWAY_URL | cut -d'=' -f2) npx vercel --prod --token $VERCEL_TOKEN --yes
  environment:
    name: production
  dependencies:
    - deploy:backend
  only:
    - main
    - master

deploy:frontend:netlify:
  stage: deploy
  image: node:latest
  script:
    - cd services/frontend
    - API_GATEWAY_ORIGIN=$(cat ../../deploy.env | grep API_GATEWAY_URL | cut -d'=' -f2) npm ci
    - npm run build
    - npx netlify-cli deploy --prod --dir=.next --token=$NETLIFY_AUTH_TOKEN
  environment:
    name: production
  dependencies:
    - deploy:backend
  only:
    - main
    - master
