substitutions:
  _REGION: us-central1
  _GEMINI_API_KEY: ""
  _AR_REPOSITORY: hello-world-enterprise-images

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: configure-artifact-registry-auth
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud auth configure-docker "${_REGION}-docker.pkg.dev" --quiet

  - name: gcr.io/cloud-builders/docker
    id: build-backend-images
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        for entry in \
          ai-decision-engine:services/ai-decision-engine \
          teapot-service:services/teapot-service \
          punctuation-service:services/punctuation-service \
          feature-flag-service:services/feature-flag-service \
          ab-testing-service:services/ab-testing-service \
          concatenation-service:services/concatenation-service \
          capitalization-service:services/capitalization-service \
          api-gateway:services/api-gateway
        do
          name="${entry%%:*}"
          path="${entry#*:}"
          image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${name}:$COMMIT_SHA"

          echo "Building ${name}"
          docker build -t "${image}" "./${path}"
          docker push "${image}"
        done

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend-services
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        mkdir -p /workspace/.cloud-run

        AI_URL="$(gcloud run deploy ai-decision-engine \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/ai-decision-engine:$COMMIT_SHA" \
          --platform managed \
          --region "${_REGION}" \
          --no-allow-unauthenticated \
          --port 8081 \
          --set-env-vars "GEMINI_API_KEY=${_GEMINI_API_KEY}" \
          --quiet \
          --format='value(status.url)')"

        TEAPOT_URL="$(gcloud run deploy teapot-service \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/teapot-service:$COMMIT_SHA" \
          --platform managed \
          --region "${_REGION}" \
          --no-allow-unauthenticated \
          --port 8082 \
          --set-env-vars "GEMINI_API_KEY=${_GEMINI_API_KEY}" \
          --quiet \
          --format='value(status.url)')"

        PUNCTUATION_URL="$(gcloud run deploy punctuation-service \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/punctuation-service:$COMMIT_SHA" \
          --platform managed \
          --region "${_REGION}" \
          --no-allow-unauthenticated \
          --port 8083 \
          --quiet \
          --format='value(status.url)')"

        FEATURE_FLAG_URL="$(gcloud run deploy feature-flag-service \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/feature-flag-service:$COMMIT_SHA" \
          --platform managed \
          --region "${_REGION}" \
          --no-allow-unauthenticated \
          --port 8084 \
          --quiet \
          --format='value(status.url)')"

        AB_TESTING_URL="$(gcloud run deploy ab-testing-service \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/ab-testing-service:$COMMIT_SHA" \
          --platform managed \
          --region "${_REGION}" \
          --no-allow-unauthenticated \
          --port 8085 \
          --quiet \
          --format='value(status.url)')"

        CONCATENATION_URL="$(gcloud run deploy concatenation-service \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/concatenation-service:$COMMIT_SHA" \
          --platform managed \
          --region "${_REGION}" \
          --no-allow-unauthenticated \
          --port 8086 \
          --quiet \
          --format='value(status.url)')"

        CAPITALIZATION_URL="$(gcloud run deploy capitalization-service \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/capitalization-service:$COMMIT_SHA" \
          --platform managed \
          --region "${_REGION}" \
          --no-allow-unauthenticated \
          --port 8087 \
          --quiet \
          --format='value(status.url)')"

        API_GATEWAY_URL="$(gcloud run deploy api-gateway \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/api-gateway:$COMMIT_SHA" \
          --platform managed \
          --region "${_REGION}" \
          --allow-unauthenticated \
          --port 8080 \
          --set-env-vars "AI_DECISION_ENGINE_URL=$$AI_URL,TEAPOT_SERVICE_URL=$$TEAPOT_URL,PUNCTUATION_SERVICE_URL=$$PUNCTUATION_URL,FEATURE_FLAG_SERVICE_URL=$$FEATURE_FLAG_URL,AB_TESTING_SERVICE_URL=$$AB_TESTING_URL,CONCATENATION_SERVICE_URL=$$CONCATENATION_URL,CAPITALIZATION_SERVICE_URL=$$CAPITALIZATION_URL,GCP_SERVICE_TO_SERVICE_AUTH=true" \
          --quiet \
          --format='value(status.url)')"

        cat <<EOF > /workspace/.cloud-run/urls.env
        AI_DECISION_ENGINE_URL=$$AI_URL
        TEAPOT_SERVICE_URL=$$TEAPOT_URL
        PUNCTUATION_SERVICE_URL=$$PUNCTUATION_URL
        FEATURE_FLAG_SERVICE_URL=$$FEATURE_FLAG_URL
        AB_TESTING_SERVICE_URL=$$AB_TESTING_URL
        CONCATENATION_SERVICE_URL=$$CONCATENATION_URL
        CAPITALIZATION_SERVICE_URL=$$CAPITALIZATION_URL
        API_GATEWAY_URL=$$API_GATEWAY_URL
        EOF

        cat /workspace/.cloud-run/urls.env

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: smoke-test-backend
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        source /workspace/.cloud-run/urls.env

        mint_identity_token() {
          gcloud auth print-identity-token --audiences="$1"
        }

        curl -fsS "$$API_GATEWAY_URL/health"
        curl -fsS -H "Authorization: Bearer $(mint_identity_token "$$AI_DECISION_ENGINE_URL")" "$$AI_DECISION_ENGINE_URL/health"
        curl -fsS -H "Authorization: Bearer $(mint_identity_token "$$PUNCTUATION_SERVICE_URL")" "$$PUNCTUATION_SERVICE_URL/health"

        response="$(curl -fsS \
          -H "Content-Type: application/json" \
          -d '{"recipient":"World","channel":"web","locale":"en-US","preferredGreeting":"auto"}' \
          "$$API_GATEWAY_URL/api/greet")"

        echo "${response}" | grep '"greeting"' > /dev/null

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/ai-decision-engine:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/teapot-service:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/punctuation-service:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/feature-flag-service:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/ab-testing-service:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/concatenation-service:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/capitalization-service:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/api-gateway:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 3600s

tags:
  - hello-world-enterprise
  - cloud-run
  - backend-only
