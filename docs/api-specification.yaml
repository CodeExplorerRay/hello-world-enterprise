openapi: 3.0.3
info:
  title: HelloWorld Enterprise API
  description: The world's most over-engineered greeting service API
  version: 1.0.0
  contact:
    name: HelloWorld Enterprise Support
    email: support@helloworld-enterprise.com
  license:
    name: "Don't Use This In Production License"
    url: https://choosealicense.com/licenses/unlicense/

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.helloworld-enterprise.com
    description: Production server

paths:
  /api/greet:
    get:
      summary: Get the enterprise greeting
      description: |
        Retrieves the ultimate "Hello World" greeting through our 9-microservice architecture.

        This endpoint orchestrates:
        - AI-powered greeting decision making
        - Feature flag evaluation
        - Multi-language string processing
        - A/B testing for punctuation
        - Health checks via HTCPCP protocol
      operationId: getGreeting
      responses:
        '200':
          description: Successful greeting retrieval
          content:
            application/json:
              schema:
                type: object
                properties:
                  greeting:
                    type: string
                    example: "Hello World!"
                    description: The final greeting text
                  metadata:
                    type: object
                    properties:
                      processingTimeMs:
                        type: integer
                        example: 15000
                        description: Total processing time including loading animation
                      microservicesInvoked:
                        type: integer
                        example: 7
                        description: Number of microservices called
                      aiTokensUsed:
                        type: integer
                        example: 45
                        description: AI tokens consumed for greeting decision
                      teapotStatus:
                        type: integer
                        example: 418
                        description: HTCPCP health check status
                      architectureDecisionRecordsConsulted:
                        type: integer
                        example: 47
                        description: Number of ADR documents referenced
                      wasItWorthIt:
                        type: boolean
                        example: false
                        description: Philosophical assessment of the architecture
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Whoa there! Our Hello World infrastructure can only handle 1 greeting per minute."

components:
  schemas:
    GreetingResponse:
      type: object
      required:
        - greeting
        - metadata
      properties:
        greeting:
          type: string
          description: The greeting text
        metadata:
          type: object
          description: Processing metadata
          properties:
            processingTimeMs:
              type: integer
              description: Processing time in milliseconds
            microservicesInvoked:
              type: integer
              description: Number of microservices used
            aiTokensUsed:
              type: integer
              description: AI API tokens consumed
            teapotStatus:
              type: integer
              description: Health check status code
            architectureDecisionRecordsConsulted:
              type: integer
              description: ADRs referenced
            wasItWorthIt:
              type: boolean
              description: Value assessment

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Optional API key for authenticated requests

security:
  - ApiKeyAuth: []

tags:
  - name: Greetings
    description: Greeting-related operations
  - name: Enterprise
    description: Over-engineered enterprise features

externalDocs:
  description: Find out more about HelloWorld Enterprise
  url: https://github.com/your-org/hello-world-enterprise