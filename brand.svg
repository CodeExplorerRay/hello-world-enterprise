<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
<!-- Digital Signature: Ownership verified by CodeExplorerRay on 2026-04-02 -->
<metadata>
  <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:cc="http://creativecommons.org/ns#">
    <cc:Work rdf:about="">
      <dc:title>Hello World Enterprise Brand Logo</dc:title>
      <dc:creator>CodeExplorerRay</dc:creator>
      <dc:rights>© 2026 CodeExplorerRay. All rights reserved.</dc:rights>
      <dc:date>2026-04-02</dc:date>
    </cc:Work>
  </rdf:RDF>
</metadata>
  <defs>

    <!-- Multi-color gradient text -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00cc"/>
      <stop offset="25%" stop-color="#3333ff"/>
      <stop offset="50%" stop-color="#00ffcc"/>
      <stop offset="75%" stop-color="#ffff00"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Main Title -->
  <text x="50%" y="45%"
        text-anchor="middle"
        font-family="Courier New, monospace"
        font-size="60"
        fill="url(#textGradient)"
        filter="url(#glow)">
    HelloWorld
  </text>

  <!-- Subtitle -->
  <text x="50%" y="65%"
        text-anchor="middle"
        font-family="Courier New, monospace"
        font-size="28"
        fill="#00cc66">
    Enterprise Edition™
  </text>

  <!-- Terminal Line -->
  <text x="50%" y="80%"
        text-anchor="middle"
        font-family="Courier New, monospace"
        font-size="20"
        fill="#00aa55">
    $ initializing system
  </text>

  <!-- Animated dots -->
  <text x="720" y="240"
        font-family="Courier New, monospace"
        font-size="20"
        fill="#00aa55">
    ...
    <animate attributeName="opacity"
             values="0;1;0"
             dur="1.5s"
             repeatCount="indefinite"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="760" y="225" width="10" height="20" fill="#00aa55">
    <animate attributeName="opacity"
             values="1;0;1"
             dur="1s"
             repeatCount="indefinite"/>
  </rect>

  <!-- Spinning loader -->
  <g transform="translate(850,235)">
    <circle r="12" stroke="#00aa55" stroke-width="2" fill="none"
            stroke-dasharray="4 4">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0"
        to="360"
        dur="2s"
        repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Invisible Watermark for Ownership Proof -->
  <text x="0" y="0" opacity="0" font-size="1">Watermark: Owned by CodeExplorerRay - Copyright 2026</text>
</svg>